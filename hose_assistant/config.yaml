name: Hose Assistant
version: "1.1.3"
slug: hose_assistant
description: Smart irrigation calculator & controller — ET-based, weather-aware, AI-assisted.
url: https://github.com/schultz-it/hose-assistant
arch:
  - aarch64
  - amd64
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:sprinkler-variant
panel_title: Hose Assistant
hassio_api: true
homeassistant_api: true
services:
  - mqtt:want
options:
  log_level: info
  ai_provider: none
  ai_api_key: ""
  ai_model: ""
schema:
  log_level: list(debug|info|warning|error)
  ai_provider: list(none|ha_conversation|anthropic|openai)
  ai_api_key: str?
  ai_model: str?
